events {
    worker_connections 1024;
}

http {
    # Basic settings
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'cipher';
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # HTTP to HTTPS redirect for all services
    server {
        listen 80;
        server_name git.lab.local blog.lab.local status.lab.local docs.lab.local wiki.lab.local portainer.lab.local apps.lab.local;
        return 301 https://$host$request_uri;
    }

    # Gitea (HTTPS)
    server {
        listen 443 ssl;
        server_name git.lab.local;

        ssl_certificate /etc/nginx/ssl/apps.lab.local.crt;
        ssl_certificate_key /etc/nginx/ssl/apps.lab.local.key;

        location / {
            proxy_pass http://gitea:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # WordPress (HTTPS)
    server {
        listen 443 ssl;
        server_name blog.lab.local;

        ssl_certificate /etc/nginx/ssl/apps.lab.local.crt;
        ssl_certificate_key /etc/nginx/ssl/apps.lab.local.key;

        location / {
            proxy_pass http://wordpress:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Uptime Kuma (HTTPS)
    server {
        listen 443 ssl;
        server_name status.lab.local;

        ssl_certificate /etc/nginx/ssl/apps.lab.local.crt;
        ssl_certificate_key /etc/nginx/ssl/apps.lab.local.key;

        location / {
            proxy_pass http://uptime-kuma:3001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # DokuWiki (HTTPS)
    server {
        listen 443 ssl;
        server_name docs.lab.local wiki.lab.local;

        ssl_certificate /etc/nginx/ssl/apps.lab.local.crt;
        ssl_certificate_key /etc/nginx/ssl/apps.lab.local.key;

        location / {
            proxy_pass http://dokuwiki:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Portainer (HTTPS)
    server {
        listen 443 ssl;
        server_name portainer.lab.local;

        ssl_certificate /etc/nginx/ssl/apps.lab.local.crt;
        ssl_certificate_key /etc/nginx/ssl/apps.lab.local.key;

        location / {
            proxy_pass http://portainer:9000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # Vaultwarden (HTTPS)
    server {
        listen 443 ssl;
        server_name vault.lab.local;

        ssl_certificate /etc/nginx/ssl/apps.lab.local.crt;
        ssl_certificate_key /etc/nginx/ssl/apps.lab.local.key;

        location / {
            proxy_pass http://vaultwarden:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # Default server - Landing page (HTTPS)
    server {
        listen 443 ssl default_server;
        server_name apps.lab.local _;

        ssl_certificate /etc/nginx/ssl/apps.lab.local.crt;
        ssl_certificate_key /etc/nginx/ssl/apps.lab.local.key;

        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ =404;
        }
    }
}
